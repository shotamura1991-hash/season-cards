<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#fff7ee">
  <title>きせつカード</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">

    <!-- ▼ スタートがめん -->
    <section id="start-screen" class="screen">
      <h1 class="title">きせつ<span>カード</span></h1>
      <p class="subtitle">えを みて、なまえと きせつを えらぼう！</p>

      <div class="filter">
        <p class="filter-label">どの きせつで あそぶ？</p>
        <div class="filter-buttons">
          <button class="filter-btn is-active" data-filter="all">ぜんぶ</button>
          <button class="filter-btn" data-filter="haru">はる</button>
          <button class="filter-btn" data-filter="natsu">なつ</button>
          <button class="filter-btn" data-filter="aki">あき</button>
          <button class="filter-btn" data-filter="fuyu">ふゆ</button>
        </div>
      </div>

      <button id="start-btn" class="primary-btn">スタート</button>
    </section>

    <!-- ▼ クイズがめん -->
    <section id="quiz-screen" class="screen hidden">
      <header class="quiz-header">
        <button id="home-btn" class="icon-btn" title="さいしょへ もどる" aria-label="さいしょへ もどる">🏠</button>
        <div class="progress">
          <div class="progress-bar"><div id="progress-fill"></div></div>
          <span id="progress-text">1 / 10</span>
        </div>
        <button id="sound-btn" class="icon-btn" title="おとの オン・オフ" aria-label="おとの オン・オフ">🔊</button>
      </header>

      <div class="card">
        <div id="card-art" class="card-art" aria-hidden="true"></div>
        <div id="card-name" class="card-name"></div>
      </div>

      <p id="question" class="question">これは なに？</p>
      <div id="choices" class="choices"></div>

      <div id="feedback" class="feedback" aria-live="polite"></div>
    </section>

    <!-- ▼ けっかがめん -->
    <section id="result-screen" class="screen hidden">
      <div class="result-emoji">🎉</div>
      <h2 class="result-title">ぜんぶ できたね！</h2>
      <p id="result-detail" class="result-detail"></p>
      <div id="result-stars" class="result-stars"></div>
      <button id="again-btn" class="primary-btn">もういちど</button>
      <button id="back-btn" class="secondary-btn">きせつを えらぶ</button>
    </section>

  </div>

  <!-- データ（カード）→ アプリ本体 のじゅんに よみこみます -->
  <script src="cards.js"></script>
  <script src="app.js"></script>
</body>
</html>
